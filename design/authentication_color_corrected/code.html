<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KrishiMitra - Authentication</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Space+Grotesk:wght@500&amp;family=Rajdhani:wght@600;700&amp;family=Hind:wght@400;500&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#00FF41", // Neon Green from SCREEN_6
              "primary-container": "#003d10",
              "on-primary": "#000000",
              "background": "#020402", // Deep dark from SCREEN_6
              "surface": "#050805",
              "surface-container": "#0a0e0a",
              "on-surface": "#e0e2e0",
              "on-surface-variant": "#a2a5a2",
              "outline": "#2f322f",
              "outline-variant": "#2f322f",
              "error": "#FF3B30",
              "surface-container-high": "#0a0e0a",
              "surface-container-highest": "#0f140f",
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Space Grotesk"],
              "brand": ["Rajdhani"],
              "hindi": ["Hind"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px", "2xl": "1.75rem", "3xl": "1.5rem"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #020402;
            background-image: 
              radial-gradient(circle at 50% 0%, rgba(0, 255, 65, 0.05) 0%, transparent 50%),
              url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3BaseFilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/baseFilter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            background-blend-mode: overlay;
        }
        .glass-panel {
            background: rgba(0, 255, 65, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 255, 65, 0.1);
            position: relative;
            overflow: hidden;
        }
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 65, 0.3), transparent);
            z-index: 1;
        }
        .glow-aura {
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        .firefly {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00FF41;
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 10px #00FF41;
        }
        .glow-text {
            text-shadow: 0 0 15px rgba(0, 255, 65, 0.6);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden selection:bg-primary selection:text-on-primary antialiased">
<!-- Hero Background Layer -->
<div class="fixed inset-0 z-0 overflow-hidden">
<!-- Fireflies remain for atmosphere -->
<div class="firefly top-1/4 left-1/4" style="opacity: 0.4;"></div>
<div class="firefly top-1/3 right-1/4" style="opacity: 0.5;"></div>
<div class="firefly top-1/2 left-1/2" style="opacity: 0.3;"></div>
<div class="firefly bottom-1/3 left-10" style="opacity: 0.4;"></div>
<div class="firefly bottom-1/4 right-20" style="opacity: 0.2;"></div>
</div>
<!-- Top Utility Area -->
<header class="relative z-20 flex flex-col gap-4 p-6 max-w-lg mx-auto">
<div class="flex justify-between items-center">
<div class="w-10"></div>
<!-- Dark Mode Toggle -->
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container text-on-surface border border-outline/50 shadow-lg">
<span class="material-symbols-outlined text-[20px]">dark_mode</span>
</button>
</div>
<!-- Language Selector -->
<div class="flex items-center gap-2 overflow-x-auto no-scrollbar pb-2">
<button class="flex-none px-5 py-2 glass-panel rounded-full text-sm font-medium border-primary/40 bg-primary/10 text-primary glow-aura transition-all">हिंदी</button>
<button class="flex-none px-5 py-2 glass-panel rounded-full text-sm font-medium text-on-surface-variant hover:bg-white/5 transition-all">मराठी</button>
<button class="flex-none px-5 py-2 glass-panel rounded-full text-sm font-medium text-on-surface-variant hover:bg-white/5 transition-all">ਪੰਜਾਬੀ</button>
<button class="flex-none px-5 py-2 glass-panel rounded-full text-sm font-medium text-on-surface-variant hover:bg-white/5 transition-all">தமிழ்</button>
<button class="flex-none px-5 py-2 glass-panel rounded-full text-sm font-medium text-on-surface-variant hover:bg-white/5 transition-all">English</button>
</div>
</header>
<!-- Main Branding Content -->
<main class="relative z-10 flex flex-col items-center justify-center pt-12 px-6 max-w-lg mx-auto text-center">
<!-- Logo -->
<div class="relative mb-6">
<div class="absolute inset-0 blur-3xl bg-primary/20 rounded-full"></div>
<div class="relative w-24 h-24 flex items-center justify-center bg-surface-container border border-primary/20 rounded-[32px] rotate-45 transform glow-aura">
<span class="material-symbols-outlined text-primary text-5xl -rotate-45" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
</div>
<!-- Wordmark -->
<h1 class="font-brand text-5xl font-bold tracking-tight text-on-surface glow-text mb-2">
        KrishiMitra
    </h1>
<!-- Tagline -->
<p class="font-hindi text-lg text-on-surface-variant tracking-wide font-medium">
        Your Smart Farming Companion
    </p>
</main>
<!-- Login Bottom Sheet -->
<section class="fixed inset-x-0 bottom-0 z-50 max-w-lg mx-auto">
<div class="glass-panel rounded-t-[40px] px-8 pt-8 pb-10 flex flex-col gap-6 shadow-[0_-20px_80px_rgba(0,0,0,0.8)] border-t border-primary/20">
<!-- Handle Decor -->
<div class="w-12 h-1.5 bg-primary/20 rounded-full mx-auto mb-2"></div>
<div class="space-y-1">
<h2 class="text-2xl font-headline font-bold text-on-surface">Welcome back</h2>
<p class="text-on-surface-variant font-body">Enter your mobile number to get started</p>
</div>
<!-- Mobile Input Field -->
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none z-10">
<span class="flex items-center gap-1.5 px-3 py-1 bg-surface-container rounded-lg text-sm font-label text-primary border border-primary/20">
                    +91
                </span>
</div>
<input class="w-full bg-surface-container-highest border border-outline/50 rounded-2xl py-4 pl-24 pr-4 text-on-surface font-body focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/5 transition-all placeholder:text-outline" maxlength="10" placeholder="Mobile Number" type="tel"/>
<label class="absolute -top-3 left-6 px-2 bg-surface text-[10px] font-bold uppercase tracking-widest font-label text-primary border border-primary/20 rounded">
                Mobile Number
            </label>
</div>
<!-- OTP Entry Area -->
<div class="space-y-4">
<div class="flex justify-between gap-2">
<input class="w-12 h-16 bg-surface-container-highest border border-outline/50 rounded-xl text-center text-xl font-label text-primary focus:border-primary focus:ring-4 focus:ring-primary/5 outline-none transition-all" maxlength="1" placeholder="-" type="text"/>
<input class="w-12 h-16 bg-surface-container-highest border border-outline/50 rounded-xl text-center text-xl font-label text-primary focus:border-primary focus:ring-4 focus:ring-primary/5 outline-none transition-all" maxlength="1" placeholder="-" type="text"/>
<input class="w-12 h-16 bg-surface-container-highest border border-outline/50 rounded-xl text-center text-xl font-label text-primary focus:border-primary focus:ring-4 focus:ring-primary/5 outline-none transition-all" maxlength="1" placeholder="-" type="text"/>
<input class="w-12 h-16 bg-surface-container-highest border border-outline/50 rounded-xl text-center text-xl font-label text-primary focus:border-primary focus:ring-4 focus:ring-primary/5 outline-none transition-all" maxlength="1" placeholder="-" type="text"/>
<input class="w-12 h-16 bg-surface-container-highest border border-outline/50 rounded-xl text-center text-xl font-label text-primary focus:border-primary focus:ring-4 focus:ring-primary/5 outline-none transition-all" maxlength="1" placeholder="-" type="text"/>
<input class="w-12 h-16 bg-surface-container-highest border border-outline/50 rounded-xl text-center text-xl font-label text-primary focus:border-primary focus:ring-4 focus:ring-primary/5 outline-none transition-all" maxlength="1" placeholder="-" type="text"/>
</div>
<div class="flex justify-between items-center text-xs font-label px-1">
<span class="text-on-surface-variant font-medium">Resend OTP in <span class="text-primary font-bold">0:45</span></span>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-headline font-bold py-4 rounded-full shadow-[0_0_30px_rgba(0,255,65,0.4)] active:scale-95 transition-transform">
            Get OTP
        </button>
<!-- Links & Legal -->
<div class="flex flex-col items-center gap-6">
<a class="text-on-surface-variant font-medium hover:text-primary transition-colors text-sm underline underline-offset-4 decoration-outline" href="#">
                Continue as Guest
            </a>
<p class="text-[10px] text-center text-on-surface-variant/60 leading-relaxed max-w-[280px] font-medium">
                By continuing, you agree to KrishiMitra's 
                <a class="text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a> &amp; 
                <a class="text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
</p>
</div>
</div>
</section>
</body></html>
